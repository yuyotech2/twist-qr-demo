<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Camera Test</title>
  <style>
    body { margin: 0; background: #000; }
    video { width: 100vw; height: 100vh; object-fit: cover; display: block; }
    #btn { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); background: #00f5ff; color: #000; padding: 20px 40px; border-radius: 50px; font-size: 1.5rem; font-weight: bold; border: none; cursor: pointer; z-index: 999; }
    #banner { position: fixed; top: 0; width: 100%; background: red; color: white; text-align: center; padding: 5px; font-weight: bold; z-index: 999; font-size: 0.8rem; }
  </style>
</head>
<body>
  <div id="banner">V10 - PURE CAMERA TEST</div>
  <video id="video" autoplay playsinline></video>
  <button id="btn" onclick="startCam()">TAP TO START CAMERA</button>

  <script>
    function startCam() {
      document.getElementById('btn').style.display = 'none';
      navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
        .then(stream => {
          document.getElementById('video').srcObject = stream;
        })
        .catch(err => {
          document.getElementById('btn').innerText = 'ERROR: ' + err.message;
          document.getElementById('btn').style.display = 'block';
        });
    }
  </script>
</body>
</html>
