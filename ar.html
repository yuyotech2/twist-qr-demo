<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TwistQR | Live AR</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; font-family: sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; padding: 20px; }
    #banner { position: fixed; top: 0; left: 0; width: 100%; background: #ff0055; color: white; text-align: center; font-weight: bold; padding: 8px; z-index: 9999; font-size: 0.85rem; }
    h2 { font-size: 1.8rem; margin-bottom: 10px; color: #00f5ff; text-align: center; }
    p { color: #aaa; text-align: center; margin-bottom: 30px; font-size: 0.95rem; max-width: 320px; }
    model-viewer {
      width: 320px;
      height: 320px;
      border-radius: 20px;
      border: 3px solid #8a2be2;
      box-shadow: 0 0 30px rgba(138, 43, 226, 0.5);
      --progress-bar-color: #00f5ff;
    }
    .ar-button {
      background: #8a2be2 !important;
      color: white !important;
      border: none !important;
      padding: 14px 30px !important;
      border-radius: 50px !important;
      font-weight: bold !important;
      font-size: 1rem !important;
      margin-top: 20px !important;
    }
    #exit { margin-top: 20px; background: transparent; border: 1px solid #555; color: #aaa; padding: 12px 30px; border-radius: 50px; font-size: 0.9rem; cursor: pointer; }
  </style>
</head>
<body>
  <div id="banner">TWISTQR - LIVE WORLD AR</div>
  
  <h2>🌀 Twist AR</h2>
  <p>Preview the 3D character below, then tap <b>"View in your space"</b> to place it anywhere in your real world!</p>

  <model-viewer
    src="https://modelviewer.dev/shared-assets/models/Astronaut.glb"
    alt="TwistQR Character"
    ar
    ar-modes="webxr scene-viewer quick-look"
    camera-controls
    auto-rotate
    shadow-intensity="1"
    ar-button-class="ar-button"
    style="--ar-button-background: #8a2be2;">
    <button slot="ar-button" class="ar-button">
      🚀 Place in YOUR World
    </button>
  </model-viewer>

  <button id="exit" onclick="window.location.href='index.html'">← Back to TwistQR</button>

  <p style="margin-top: 20px; font-size: 0.75rem; color: #555;">Pinch to scale · Tap to move · Walk around it!</p>
</body>
</html>
