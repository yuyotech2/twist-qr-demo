<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
  <title>TwistQR | AR Design Hub</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    :root {
      --primary: #00f5ff;
      --secondary: #8a2be2;
      --work-accent: #4caf50;
      --danger: #ff4444;
      --bg: #050508;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Outfit', sans-serif; }
    body { background: var(--bg); color: white; height: 100vh; overflow: hidden; }

    /* UI Containers */
    #main-menu { position: relative; height: 100vh; display: flex; flex-direction: column; z-index: 10; background: var(--bg); transition: 0.5s; }
    
    /* Header */
    #header { padding: 15px; border-bottom: 2px solid var(--primary); text-align: center; background: rgba(0,0,0,0.9); }
    #header h1 { font-size: 0.8rem; letter-spacing: 5px; color: var(--primary); margin-bottom: 12px; font-weight: 900; text-transform: uppercase; }
    
    .mode-toggle { display: flex; background: rgba(255,255,255,0.05); border-radius: 50px; padding: 4px; width: 320px; margin: 0 auto; border: 1px solid rgba(255,255,255,0.1); }
    .mode-btn { flex: 1; padding: 12px; border-radius: 50px; border: none; background: none; color: #555; font-weight: 900; font-size: 0.65rem; letter-spacing: 1px; cursor: pointer; transition: 0.4s; }
    .mode-btn.active.play { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; box-shadow: 0 0 15px rgba(0,245,255,0.4); }
    .mode-btn.active.work { background: linear-gradient(135deg, var(--work-accent), #2e7d32); color: white; box-shadow: 0 0 15px rgba(76,175,80,0.4); }

    /* Preview Hub */
    #preview-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
    .preview-box { width: 280px; height: 280px; border-radius: 50px; border: 2px solid rgba(138,43,226,0.3); position: relative; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle, rgba(138,43,226,0.1) 0%, transparent 70%); }
    model-viewer { width: 100%; height: 100%; }
    
    .btn-launch { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; border: none; padding: 22px 50px; border-radius: 50px; font-weight: 900; font-size: 1.2rem; letter-spacing: 3px; margin-top: 40px; box-shadow: 0 10px 40px rgba(138,43,226,0.4); cursor: pointer; transition: 0.3s; width: 320px; }
    .btn-launch:active { transform: scale(0.95); opacity: 0.8; }
    
    #native-hint { margin-top: 15px; color: #666; font-size: 0.7rem; letter-spacing: 1px; text-transform: uppercase; font-weight: 900; }

    /* Bottom Scroller Menu */
    #selector-strip { background: rgba(0,0,0,0.6); padding: 25px 0 45px; border-top: 1px solid rgba(255,255,255,0.05); }
    .scroller { display: flex; gap: 15px; overflow-x: auto; padding: 0 20px; }
    .scroller::-webkit-scrollbar { display: none; }
    .char-card { flex: 0 0 95px; height: 110px; background: rgba(255,255,255,0.03); border: 2px solid rgba(255,255,255,0.1); border-radius: 25px; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; cursor: pointer; }
    .char-card.active.play { border-color: var(--primary); background: rgba(0,245,255,0.1); }
    .char-card.active.work { border-color: var(--work-accent); background: rgba(76,175,80,0.1); }
    .char-card .icon { font-size: 2rem; }

    /* Custom AR Sticker Mode (For Fallback/Design) */
    #custom-ar-view { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1000; background: #000; display: none; }
    #v-feed { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
    #ar-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1001; }
    .sticker { 
        position: absolute; width: 250px; height: 250px; pointer-events: auto; touch-action: none;
        display: flex; align-items: center; justify-content: center;
    }
    .sticker-handle {
        position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%);
        background: var(--primary); color: #000; width: 44px; height: 44px; 
        border-radius: 50%; display: flex; align-items: center; justify-content: center;
        font-size: 1.5rem; font-weight: bold; z-index: 10; box-shadow: 0 4px 15px rgba(0,245,255,0.5);
    }

    /* Catalog in Camera */
    #cam-catalog { 
      position: absolute; bottom: 120px; left: 0; width: 100%; height: 130px; 
      display: flex; gap: 12px; overflow-x: auto; padding: 20px; 
      pointer-events: auto; z-index: 1005; backdrop-filter: blur(25px);
      background: rgba(0,0,0,0.85); border-top: 2px solid rgba(255,255,255,0.1);
      align-items: center; scrollbar-width: none;
    }
    .cam-item { flex: 0 0 75px; height: 75px; background: rgba(255,255,255,0.05); border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; }

    .ar-controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: center; gap: 15px; pointer-events: auto; z-index: 1005; }
    .ar-btn { background: rgba(0,0,0,0.85); border: 2px solid white; color: white; padding: 14px 28px; border-radius: 50px; font-weight: 900; font-size: 0.8rem; letter-spacing: 1px; cursor: pointer; }
  </style>
</head>
<body>

  <div id="main-menu">
    <header id="header">
      <button onclick="window.location.href='index.html'" style="position:absolute; left:18px; top:12px; background:none; border:none; color:#444; font-size:1.5rem;">✕</button>
      <h1>TWIST DESIGN SUPREME</h1>
      <div class="mode-toggle">
        <button id="mode-play" class="mode-btn active play" onclick="setMode('play')">SOULS</button>
        <button id="mode-work" class="mode-btn" onclick="setMode('work')">WORK</button>
      </div>
    </header>

    <div id="preview-container">
      <div class="preview-box">
        <model-viewer id="main-view" src="https://modelviewer.dev/shared-assets/models/Astronaut.glb" ar ar-modes="webxr scene-viewer quick-look" camera-controls auto-rotate shadow-intensity="1">
            <button slot="ar-button" id="real-ar-btn" style="display:none;"></button>
        </model-viewer>
      </div>
      <!-- THIS IS THE BUTTON FOR THE "OLD WAY" (Native) -->
      <button class="btn-launch" onclick="launchNative()">🚀 LAUNCH AR (OLD WAY)</button>
      <p id="native-hint">Best for real interaction & movement</p>
      
      <!-- THIS IS THE BUTTON FOR THE MULTI-DESIGNER -->
      <button class="btn-launch" style="background: rgba(255,255,255,0.1); border: 1px solid white; margin-top:20px;" onclick="enterDesigner()">🛠️ PHOTO DESIGNER</button>
    </div>

    <div id="selector-strip"><div id="scroller" class="scroller"></div></div>
  </div>

  <!-- Custom Designer View -->
  <div id="custom-ar-view">
    <video id="v-feed" autoplay playsinline></video>
    <div id="ar-canvas"></div>
    <div id="cam-catalog"></div>
    <div class="ar-controls">
        <button class="ar-btn" onclick="exitDesigner()" style="background: var(--danger);">✕ EXIT</button>
    </div>
  </div>

  <script>
    const menu = document.getElementById('main-menu');
    const mainMv = document.getElementById('main-view');
    const designer = document.getElementById('custom-ar-view');
    const canvas = document.getElementById('ar-canvas');
    const vFeed = document.getElementById('v-feed');
    const camCat = document.getElementById('cam-catalog');
    
    let currentMode = 'play';

    const catalog = {
      play: [
        { name: 'Astro', icon: '🧑‍🚀', src: 'https://modelviewer.dev/shared-assets/models/Astronaut.glb' },
        { name: 'Robot', icon: '🤖', src: 'https://modelviewer.dev/shared-assets/models/RobotExpressive.glb' },
        { name: 'Fox', icon: '🦊', src: 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Fox/glTF-Binary/Fox.glb' },
        { name: 'Duck', icon: '🦆', src: 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Duck/glTF-Binary/Duck.glb' }
      ],
      work: [
        { name: 'Couch', icon: '🛋️', src: 'https://raw.githubusercontent.com/ks1505/ma/master/sofa.glb' },
        { name: 'Chair', icon: '🪑', src: 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/SheenChair/glTF-Binary/SheenChair.glb' },
        { name: 'Box', icon: '📦', src: 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/BoxTextured/glTF-Binary/BoxTextured.glb' }
      ]
    };

    function setMode(mode) {
        currentMode = mode;
        document.getElementById('mode-play').className = 'mode-btn ' + (mode === 'play' ? 'active play' : '');
        document.getElementById('mode-work').className = 'mode-btn ' + (mode === 'work' ? 'active work' : '');
        renderScroller();
    }

    function renderScroller() {
        const scroller = document.getElementById('scroller');
        scroller.innerHTML = '';
        catalog[currentMode].forEach(item => {
            let card = document.createElement('div');
            card.className = 'char-card';
            card.innerHTML = `<span class="icon">${item.icon}</span>`;
            card.onclick = () => {
                document.querySelectorAll('.char-card').forEach(c => c.classList.remove('active', 'play', 'work'));
                card.classList.add('active', currentMode);
                mainMv.src = item.src;
            };
            scroller.appendChild(card);
        });
        if(scroller.firstChild) scroller.firstChild.click();
    }

    // THE OLD WAY (NATIVE WebXR)
    function launchNative() {
        document.getElementById('real-ar-btn').click();
    }

    // THE DESIGNER WAY (MULTI-PHOTO)
    async function enterDesigner() {
        menu.style.display = 'none';
        designer.style.display = 'block';
        try {
            const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
            vFeed.srcObject = s;
            renderCamCatalog();
        } catch(e) { exitDesigner(); }
    }

    function exitDesigner() {
        menu.style.display = 'flex';
        designer.style.display = 'none';
        if(vFeed.srcObject) vFeed.srcObject.getTracks().forEach(t => t.stop());
        canvas.innerHTML = '';
    }

    function renderCamCatalog() {
        camCat.innerHTML = '';
        catalog[currentMode].forEach(item => {
            let div = document.createElement('div');
            div.className = 'cam-item';
            div.innerHTML = item.icon;
            div.onclick = () => addSticker(item.icon);
            camCat.appendChild(div);
        });
    }

    function addSticker(icon) {
        const s = document.createElement('div');
        s.className = 'sticker';
        s.style.left = '40%'; s.style.top = '40%';
        s.innerHTML = `<div style="font-size: 8rem;">${icon}</div><div class="sticker-handle">✥</div>`;
        canvas.appendChild(s);
        makeDraggable(s);
    }

    function makeDraggable(el) {
        let dragging = false;
        let sx, sy;
        el.addEventListener('touchstart', (e) => {
            dragging = true;
            sx = e.touches[0].clientX - el.offsetLeft;
            sy = e.touches[0].clientY - el.offsetTop;
        });
        window.addEventListener('touchmove', (e) => {
            if(!dragging) return;
            el.style.left = (e.touches[0].clientX - sx) + 'px';
            el.style.top = (e.touches[0].clientY - sy) + 'px';
        });
        window.addEventListener('touchend', () => dragging = false);
    }

    setMode('play');
  </script>
</body>
</html>
