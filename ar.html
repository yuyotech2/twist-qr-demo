<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TwistQR | AR Creator</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { background: #080810; font-family: 'Inter', system-ui, sans-serif; color: white; min-height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    /* Star Background */
    #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 50%, #1a1a3a 0%, #080810 100%); z-index: -1; }
    .stars { position: absolute; width: 2px; height: 2px; background: white; border-radius: 50%; opacity: 0.3; animation: twinkle var(--speed) linear infinite; }
    @keyframes twinkle { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 1; transform: scale(1.5); } }

    /* Header */
    #header {
      z-index: 10; background: rgba(8,8,16,0.9); backdrop-filter: blur(12px);
      padding: 16px 20px; text-align: center; border-bottom: 2px solid #8a2be2;
    }
    #header h1 { font-size: 1.3rem; font-weight: 900; letter-spacing: 4px; color: #00f5ff; text-transform: uppercase; }
    #back-btn { position: absolute; top: 16px; left: 15px; background: rgba(255,255,255,0.1); border: 1px solid #444; color: #fff; padding: 6px 15px; border-radius: 50px; font-size: 0.8rem; cursor: pointer; }

    /* Interactive Preview Area */
    #ar-hub { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
    
    .portal { position: relative; width: min(300px, 80vw); height: min(300px, 80vw); display: flex; align-items: center; justify-content: center; }
    .portal-ring {
      position: absolute; width: 110%; height: 110%; border-radius: 50%;
      border: 3px solid #8a2be2;
      box-shadow: 0 0 20px #8a2be2, inset 0 0 20px #8a2be2;
      animation: pulsePortal 2s ease-in-out infinite alternate;
    }
    @keyframes pulsePortal { from { transform: scale(1); opacity: 0.5; } to { transform: scale(1.05); opacity: 0.8; } }

    /* 2D Image Preview Area */
    #custom-img-container {
      display: none; position: relative; width: 80%; height: 80%; 
      background: #000; border: 4px solid #00f5ff; border-radius: 12px;
      overflow: hidden; box-shadow: 0 0 40px rgba(0,245,255,0.6);
      animation: hoverImg 4s ease-in-out infinite;
    }
    #custom-img-preview { width: 100%; height: 100%; object-fit: contain; }
    .glint { position: absolute; top: 0; left: -100%; width: 50%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent); animation: glintMove 2.5s infinite; }
    @keyframes glintMove { 0% { left: -100%; } 100% { left: 200%; } }

    model-viewer { width: 100%; height: 100%; animation: hoverModel 4s ease-in-out infinite; }
    @keyframes hoverModel { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
    @keyframes hoverImg { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-20px) scale(1.05); } }

    /* LAUNCH BUTTONS */
    #master-ar-btn {
      position: relative; margin-top: 30px; 
      background: linear-gradient(135deg, #00f5ff, #8a2be2);
      color: white; border: none; padding: 18px 45px; border-radius: 50px;
      font-weight: 900; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 2px;
      cursor: pointer; box-shadow: 0 10px 40px rgba(138,43,226,0.6);
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 100;
    }

    /* Selection Bottom Panel - SCROLLABLE */
    #selector {
      background: rgba(10,10,24,0.98); border-top: 2px solid #00f5ff;
      padding: 15px 0 35px; box-shadow: 0 -10px 40px rgba(0,0,0,0.8); z-index: 50;
    }
    #selector h3 { text-align: center; font-size: 0.75rem; color: #aaa; text-transform: uppercase; letter-spacing: 4px; margin-bottom: 15px; }
    
    .scroll-grid {
      display: flex; gap: 15px; overflow-x: auto; padding: 5px 20px 10px;
      scroll-behavior: smooth; -webkit-overflow-scrolling: touch;
    }
    .scroll-grid::-webkit-scrollbar { display: none; }

    .card {
      flex: 0 0 95px; background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.1);
      border-radius: 20px; padding: 18px 5px; text-align: center; cursor: pointer; transition: 0.3s;
    }
    .card.active { border-color: #00f5ff; background: rgba(0,245,255,0.15); transform: translateY(-8px); }
    .card.upload-btn { border-style: dashed; border-color: #ff0055; background: rgba(255,0,85,0.05); }
    .card .icon { font-size: 2.2rem; display: block; margin-bottom: 8px; }
    .card .label { font-size: 0.65rem; color: #fff; font-weight: 800; text-transform: uppercase; }

    #hidden-upload { display: none; }
    #status-text { margin-top: 15px; font-weight: 900; color: #00f5ff; letter-spacing: 2px; font-size: 0.75rem; text-transform: uppercase; }
  </style>
</head>
<body>
  <div id="bg-canvas"></div>
  <header id="header">
    <button id="back-btn" onclick="window.location.href='index.html'">← EXIT</button>
    <h1>TWIST AR HUB</h1>
  </header>
  <main id="ar-hub">
    <div class="portal">
      <div class="portal-ring"></div>
      
      <!-- 3D Model Viewer (hidden when image is uploaded) -->
      <model-viewer id="main-viewer"
        src="https://modelviewer.dev/shared-assets/models/Astronaut.glb"
        alt="AR Soul" ar ar-modes="webxr scene-viewer quick-look"
        camera-controls auto-rotate autoplay shadow-intensity="1" exposure="1.2"
        style="display: block;">
        <!-- The button inside model-viewer only works for 3D GLB files -->
        <button slot="ar-button" style="display:none;" id="default-ar-button"></button>
      </model-viewer>

      <!-- 2D Image Preview Area (shown when image is uploaded) -->
      <div id="custom-img-container">
        <img id="custom-img-preview" src="" alt="Custom Image">
        <div class="glint"></div>
      </div>
    </div>

    <div id="status-text">🧑‍🚀 Astronaut Ready</div>
    
    <!-- MASTER LAUNCH BUTTON (Handles both 3D and 2D) -->
    <button id="master-ar-btn" onclick="triggerAR()">⚡ LAUNCH EXPERIENCE</button>
  </main>

  <section id="selector">
    <h3>SWIPE to Select Character</h3>
    <div class="scroll-grid">
      <div class="card upload-btn" onclick="document.getElementById('hidden-upload').click()">
        <span class="icon">📸</span>
        <span class="label">UPLOAD</span>
      </div>
      <input type="file" id="hidden-upload" accept="image/*" onchange="handleUpload(this)">
      <div class="card active" onclick="setChar(this, 'Astronaut', 'https://modelviewer.dev/shared-assets/models/Astronaut.glb', '🧑‍🚀')">
        <span class="icon">🧑‍🚀</span><span class="label">Astronaut</span>
      </div>
      <div class="card" onclick="setChar(this, 'Robot', 'https://modelviewer.dev/shared-assets/models/RobotExpressive.glb', '🤖')">
        <span class="icon">🤖</span><span class="label">Robot</span>
      </div>
      <div class="card" onclick="setChar(this, 'Fox', 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Fox/glTF-Binary/Fox.glb', '🦊')">
        <span class="icon">🦊</span><span class="label">Fox</span>
      </div>
    </div>
  </section>

  <script>
    const bg = document.getElementById('bg-canvas');
    for(let i=0; i<60; i++){
      let s = document.createElement('div'); s.className = 'stars';
      s.style.left = Math.random()*100+'%'; s.style.top = Math.random()*100+'%';
      s.style.setProperty('--speed', (2+Math.random()*4)+'s'); bg.appendChild(s);
    }

    const mv = document.getElementById('main-viewer');
    const photoContainer = document.getElementById('custom-img-container');
    const previewImg = document.getElementById('custom-img-preview');
    const status = document.getElementById('status-text');
    let isCustomMode = false;

    function triggerAR() {
      if (isCustomMode) {
        // Since custom images aren't GLB files, we simulate the 'Look in space' logic
        // For a real production app, you would use a service to convert PNG to GLB on the fly
        alert("✨ PREPARING HOLOGRAM... Point your camera at a flat surface and tap when the reticle appears!");
        // We trigger the hidden AR button if it's a 3D model, but for 2D, we show this message
        // for now as browsers don't natively supportPNG-to-AR without a 3D container.
      } else {
        // Trigger the hidden model-viewer AR launch
        document.getElementById('default-ar-button').click();
      }
    }

    function setChar(el, name, src, icon) {
      isCustomMode = false;
      document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
      el.classList.add('active');
      
      mv.style.display = 'block';
      photoContainer.style.display = 'none';
      mv.src = src;
      status.innerText = icon + " " + name + " Ready";
    }

    function handleUpload(input) {
      if (input.files && input.files[0]) {
        isCustomMode = true;
        const reader = new FileReader();
        reader.onload = function(e) {
          document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
          input.parentElement.classList.add('active');
          
          mv.style.display = 'none';
          photoContainer.style.display = 'block';
          previewImg.src = e.target.result;
          status.innerText = "✨ CUSTOM PHOTO READY";
        }
        reader.readAsDataURL(input.files[0]);
      }
    }
  </script>
</body>
</html>
