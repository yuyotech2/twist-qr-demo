<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>TwistQR | AR Hub</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { background: #000; font-family: 'Inter', sans-serif; color: white; height: 100vh; overflow: hidden; }

    /* UI Layers */
    #main-ui { position: relative; height: 100vh; display: flex; flex-direction: column; z-index: 10; background: #080810; transition: transform 0.5s ease; }
    #ar-view { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; display: none; }
    #camera-feed { width: 100%; height: 100%; object-fit: cover; }
    
    /* Header */
    #header { padding: 15px; border-bottom: 2px solid #8a2be2; text-align: center; background: rgba(8,8,16,0.9); }
    #header h1 { font-size: 1.2rem; letter-spacing: 3px; color: #00f5ff; }
    #exit-app { position: absolute; top: 15px; left: 15px; background: rgba(255,255,255,0.1); border: 1px solid #444; color: #fff; padding: 5px 12px; border-radius: 50px; cursor: pointer; }

    /* Preview Area */
    #preview-hub { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
    .portal { width: 280px; height: 280px; border-radius: 50%; border: 3px solid #8a2be2; box-shadow: 0 0 30px #8a2be2; display: flex; align-items: center; justify-content: center; position: relative; }
    
    model-viewer { width: 100%; height: 100%; --poster-color: transparent; }
    #img-ghost-preview { max-width: 80%; max-height: 80%; border: 3px solid #00f5ff; box-shadow: 0 0 20px #00f5ff; display: none; animation: float 3s ease-in-out infinite; }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

    /* Buttons */
    .launch-btn { 
      background: linear-gradient(135deg, #00f5ff, #8a2be2);
      color: #fff; border: none; padding: 15px 40px; border-radius: 50px;
      font-weight: 800; font-size: 1.1rem; letter-spacing: 2px;
      margin-top: 25px; box-shadow: 0 10px 30px rgba(138,43,226,0.5);
      cursor: pointer;
    }

    /* Selector Panel */
    #selector { padding: 20px 0 40px; border-top: 2px solid #00f5ff; background: #0a0a18; }
    .scroller { display: flex; gap: 15px; overflow-x: auto; padding: 0 20px; }
    .scroller::-webkit-scrollbar { display: none; }
    .card { flex: 0 0 90px; height: 110px; background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.1); border-radius: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; }
    .card.active { border-color: #00f5ff; background: rgba(0,245,255,0.1); transform: translateY(-5px); }
    .card .icon { font-size: 1.8rem; margin-bottom: 5px; }
    .card .label { font-size: 0.6rem; font-weight: 800; text-transform: uppercase; color: #888; }
    .card.active .label { color: #fff; }

    /* Live AR Overlay UI */
    #ar-controls { position: absolute; bottom: 40px; width: 100%; display: flex; justify-content: center; gap: 20px; pointer-events: none; }
    .ar-ui-btn { pointer-events: auto; background: white; color: black; border: none; padding: 12px 25px; border-radius: 50px; font-weight: 800; }
    #sticker-obj { position: absolute; pointer-events: auto; touch-action: none; display: none; }
    #status-msg { position: absolute; top: 100px; width: 100%; text-align: center; color: #00f5ff; font-weight: 900; text-shadow: 0 2px 10px #000; pointer-events: none; }
  </style>
</head>
<body>

  <!-- MAIN MENU UI -->
  <div id="main-ui">
    <header id="header">
      <button id="exit-app" onclick="window.location.href='index.html'">←</button>
      <h1>TWIST AR</h1>
    </header>

    <div id="preview-hub">
      <div class="portal">
        <model-viewer id="mv" src="https://modelviewer.dev/shared-assets/models/Astronaut.glb" ar ar-modes="webxr scene-viewer quick-look" camera-controls auto-rotate autoplay shadow-intensity="1">
          <button id="real-ar-btn" slot="ar-button" style="display:none;"></button>
        </model-viewer>
        <img id="img-ghost-preview" src="">
      </div>
      <p id="preview-label" style="margin-top:15px; font-weight:700; color:#888;">🧑‍🚀 Astronaut Selected</p>
      <button class="launch-btn" onclick="startAR()">⚡ LAUNCH AR</button>
    </div>

    <div id="selector">
      <div class="scroller">
        <!-- New Upload -->
        <div class="card" style="border-style:dashed; border-color:#ff0055;" onclick="document.getElementById('upload-input').click()">
          <span class="icon">📸</span>
          <span class="label">Upload</span>
        </div>
        <input type="file" id="upload-input" accept="image/*" style="display:none" onchange="uploadImage(this)">
        
        <div class="card active" onclick="pick(this, 'Astronaut', 'https://modelviewer.dev/shared-assets/models/Astronaut.glb', '🧑‍🚀')">
          <span class="icon">🧑‍🚀</span><span class="label">Astronaut</span>
        </div>
        <div class="card" onclick="pick(this, 'Robot', 'https://modelviewer.dev/shared-assets/models/RobotExpressive.glb', '🤖')">
          <span class="icon">🤖</span><span class="label">Robot</span>
        </div>
        <div class="card" onclick="pick(this, 'Fox', 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Fox/glTF-Binary/Fox.glb', '🦊')">
          <span class="icon">🦊</span><span class="label">Fox</span>
        </div>
        <div class="card" onclick="pick(this, 'Duck', 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Duck/glTF-Binary/Duck.glb', '🦆')">
          <span class="icon">🦆</span><span class="label">Duck</span>
        </div>
      </div>
    </div>
  </div>

  <!-- LIVE AR OVERLAY -->
  <div id="ar-view">
    <video id="camera-feed" autoplay playsinline></video>
    <div id="status-msg">📷 POINT AND TAP TO PLACE</div>
    
    <!-- This is the 'Alive' 2D Image Object -->
    <div id="sticker-obj">
      <img id="sticker-img" src="" style="width:100px; filter: drop-shadow(0 0 10px #00f5ff);">
    </div>

    <div id="ar-controls">
      <button class="ar-ui-btn" onclick="stopAR()" style="background:#ff0055; color:white;">✕ CLOSE</button>
      <button class="ar-ui-btn" onclick="alert('📸 Snapshot saved to your gallery!')">📸 PHOTO</button>
    </div>
  </div>

  <script>
    const mainUI = document.getElementById('main-ui');
    const arView = document.getElementById('ar-view');
    const mv = document.getElementById('mv');
    const ghost = document.getElementById('img-ghost-preview');
    const stickerObj = document.getElementById('sticker-obj');
    const stickerImg = document.getElementById('sticker-img');
    const video = document.getElementById('camera-feed');
    const label = document.getElementById('preview-label');

    let currentMode = '3d'; // '3d' or '2d'

    function pick(el, name, src, icon) {
      currentMode = '3d';
      document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
      el.classList.add('active');
      mv.style.display = 'block';
      ghost.style.display = 'none';
      mv.src = src;
      label.innerText = icon + " " + name + " Selected";
    }

    function uploadImage(input) {
      if (input.files && input.files[0]) {
        currentMode = '2d';
        const reader = new FileReader();
        reader.onload = function(e) {
          document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
          input.parentElement.classList.add('active');
          mv.style.display = 'none';
          ghost.style.display = 'block';
          ghost.src = e.target.result;
          stickerImg.src = e.target.result;
          label.innerText = "📸 Custom Photo Ready";
        };
        reader.readAsDataURL(input.files[0]);
      }
    }

    async function startAR() {
      if (currentMode === '3d') {
        // Native 3D AR
        document.getElementById('real-ar-btn').click();
      } else {
        // Custom 2D AR System (Self-Built)
        mainUI.style.display = 'none';
        arView.style.display = 'block';
        
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
          video.srcObject = stream;
          stickerObj.style.display = 'block';
          stickerObj.style.left = '50%';
          stickerObj.style.top = '50%';
          stickerObj.style.transform = 'translate(-50%, -50%)';
        } catch (err) {
          alert("Camera Error: Please allow camera access.");
          stopAR();
        }
      }
    }

    function stopAR() {
      mainUI.style.display = 'flex';
      arView.style.display = 'none';
      const stream = video.srcObject;
      if (stream) stream.getTracks().forEach(track => track.stop());
    }

    // Touch interaction for 2D AR sticker
    let isDragging = false;
    let stickerScale = 1;

    stickerObj.addEventListener('touchstart', (e) => { isDragging = true; });
    window.addEventListener('touchmove', (e) => {
      if (!isDragging) return;
      const t = e.touches[0];
      stickerObj.style.left = t.clientX + 'px';
      stickerObj.style.top = t.clientY + 'px';
    });
    window.addEventListener('touchend', () => { isDragging = false; });
  </script>
</body>
</html>
