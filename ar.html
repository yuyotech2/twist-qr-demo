<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TwistQR AR</title>
  <style>
    * { margin: 0; padding: 0; }
    body { overflow: hidden; font-family: sans-serif; }
    #banner { position: fixed; top: 0; left: 0; width: 100%; background: #ff0055; color: white; text-align: center; font-weight: bold; padding: 6px; z-index: 9999; font-size: 0.8rem; }
    #msg { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); color: #fff; padding: 12px 20px; border-radius: 30px; border: 2px solid #00f5ff; z-index: 9999; font-weight: bold; font-size: 0.85rem; text-align: center; max-width: 90vw; }
    #exit { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #ff0055; color: white; border: none; padding: 14px 35px; border-radius: 50px; font-size: 1rem; font-weight: bold; z-index: 9999; cursor: pointer; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/aframe@1.2.0/dist/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@ar-js-org/ar.js@3.4.5/aframe/build/aframe-ar.js"></script>
</head>
<body>
  <div id="banner">TWISTQR AR V12 - FINAL</div>
  <div id="msg">📷 Scanning... hold phone steady over the marker</div>
  <button id="exit" onclick="window.location.href='index.html'">EXIT</button>

  <a-scene
    arjs="sourceType: webcam; debugUIEnabled: false;"
    vr-mode-ui="enabled: false"
    renderer="antialias: true; alpha: true;"
    embedded>

    <a-marker preset="hiro" id="marker" emitevents="true" smooth="true" smoothCount="5">
      <!-- Spinning glowing cube -->
      <a-box
        position="0 0.5 0"
        scale="0.7 0.7 0.7"
        color="#8a2be2"
        opacity="1"
        animation="property: rotation; to: 0 360 0; dur: 2000; loop: true; easing: linear;">
      </a-box>
      <!-- Cyan ring -->
      <a-torus
        position="0 0.05 0"
        radius="0.7"
        radius-tubular="0.04"
        color="#00f5ff"
        animation="property: rotation; from: 90 0 0; to: 90 360 0; dur: 3000; loop: true; easing: linear;">
      </a-torus>
      <!-- TWIST label -->
      <a-text
        value="TWIST"
        position="0 1.4 0"
        align="center"
        color="#ffffff"
        scale="2 2 2">
      </a-text>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <script>
    const marker = document.getElementById('marker');
    const msg = document.getElementById('msg');

    marker.addEventListener('markerFound', () => {
      msg.innerText = '✨ IT\'S ALIVE! Your item is animated!';
      msg.style.borderColor = '#8a2be2';
      msg.style.background = 'rgba(138,43,226,0.9)';
    });

    marker.addEventListener('markerLost', () => {
      msg.innerText = '📷 Hold steady over the marker...';
      msg.style.borderColor = '#00f5ff';
      msg.style.background = 'rgba(0,0,0,0.85)';
    });
  </script>
</body>
</html>
