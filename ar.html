<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TwistQR AR</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: sans-serif; }
    #banner { position: fixed; top: 0; left: 0; width: 100%; background: #ff0055; color: white; text-align: center; font-weight: bold; padding: 6px; z-index: 9999; font-size: 0.8rem; }
    #msg { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); color: #fff; padding: 12px 20px; border-radius: 30px; border: 2px solid #00f5ff; z-index: 9999; font-weight: bold; font-size: 0.9rem; text-align: center; }
    #exit { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #ff0055; color: white; border: none; padding: 14px 35px; border-radius: 50px; font-size: 1rem; font-weight: bold; z-index: 9999; cursor: pointer; }
  </style>
  <!-- Use older stable versions known to work together -->
  <script src="https://aframe.io/releases/0.9.2/aframe.min.js"></script>
  <script src="https://cdn.rawgit.com/jeromeetienne/AR.js/1.7.2/aframe/build/aframe-ar.js"></script>
</head>
<body>
  <div id="banner">TWISTQR AR - V11</div>
  <div id="msg">📷 Point at the Hiro marker to see magic!</div>
  <button id="exit" onclick="window.location.href='index.html'">EXIT</button>

  <a-scene
    arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
    vr-mode-ui="enabled: false">

    <a-marker preset="hiro" id="marker" emitevents="true">
      <a-box position="0 0.5 0" scale="0.7 0.7 0.7" color="#8a2be2"
        animation="property: rotation; to: 0 360 0; dur: 2000; loop: true; easing: linear;">
      </a-box>
      <a-text value="TWIST" position="0 1.3 0" align="center" color="#00f5ff" scale="1.5 1.5 1.5"></a-text>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <script>
    const marker = document.getElementById('marker');
    const msg = document.getElementById('msg');
    marker.addEventListener('markerFound', () => {
      msg.innerText = '✨ ALIVE! Your item is animated!';
      msg.style.borderColor = '#8a2be2';
      msg.style.background = 'rgba(138,43,226,0.85)';
    });
    marker.addEventListener('markerLost', () => {
      msg.innerText = '📷 Point at the Hiro marker!';
      msg.style.borderColor = '#00f5ff';
      msg.style.background = 'rgba(0,0,0,0.85)';
    });
  </script>
</body>
</html>
