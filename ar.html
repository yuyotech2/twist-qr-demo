<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
  <title>TwistQR | AR Design Supreme 3D</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    :root {
      --primary: #00f5ff;
      --secondary: #8a2be2;
      --work-accent: #4caf50;
      --danger: #ff4444;
      --bg: #050508;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Outfit', sans-serif; }
    body { background: var(--bg); color: white; height: 100vh; overflow: hidden; }

    /* UI Containers */
    #main-menu { position: relative; height: 100vh; display: flex; flex-direction: column; z-index: 10; background: var(--bg); transition: 0.5s; }
    #ar-camera-view { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1000; background: #000; display: none; }
    #v-feed { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }

    /* Header */
    #header { padding: 15px; border-bottom: 2px solid var(--primary); text-align: center; background: rgba(0,0,0,0.9); }
    #header h1 { font-size: 0.8rem; letter-spacing: 5px; color: var(--primary); margin-bottom: 12px; font-weight: 900; text-transform: uppercase; }
    
    .mode-toggle { display: flex; background: rgba(255,255,255,0.05); border-radius: 50px; padding: 4px; width: 320px; margin: 0 auto; border: 1px solid rgba(255,255,255,0.1); }
    .mode-btn { flex: 1; padding: 12px; border-radius: 50px; border: none; background: none; color: #555; font-weight: 900; font-size: 0.65rem; letter-spacing: 1px; cursor: pointer; transition: 0.4s; }
    .mode-btn.active.play { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; box-shadow: 0 0 15px rgba(0,245,255,0.4); }
    .mode-btn.active.work { background: linear-gradient(135deg, var(--work-accent), #2e7d32); color: white; box-shadow: 0 0 15px rgba(76,175,80,0.4); }

    /* Preview Hub */
    #preview-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
    .preview-box { width: 280px; height: 280px; border-radius: 50px; border: 2px solid rgba(138,43,226,0.3); position: relative; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle, rgba(138,43,226,0.1) 0%, transparent 70%); }
    model-viewer { width: 100%; height: 100%; }
    
    .btn-launch { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; border: none; padding: 18px 60px; border-radius: 50px; font-weight: 900; font-size: 1.1rem; letter-spacing: 3px; margin-top: 40px; box-shadow: 0 10px 40px rgba(138,43,226,0.4); cursor: pointer; transition: 0.3s; }

    /* Bottom Scroller Menu */
    #selector-strip { background: rgba(0,0,0,0.6); padding: 25px 0 45px; border-top: 1px solid rgba(255,255,255,0.05); }
    .scroller { display: flex; gap: 15px; overflow-x: auto; padding: 0 20px; }
    .scroller::-webkit-scrollbar { display: none; }
    .char-card { flex: 0 0 95px; height: 110px; background: rgba(255,255,255,0.03); border: 2px solid rgba(255,255,255,0.1); border-radius: 25px; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
    .char-card.active.play { border-color: var(--primary); background: rgba(0,245,255,0.1); }
    .char-card.active.work { border-color: var(--work-accent); background: rgba(76,175,80,0.1); }
    .char-card .icon { font-size: 2rem; }

    /* AR Engine Styles */
    #ar-canvas-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1001; }
    
    .ar-object { 
      position: absolute; width: 160px; height: 160px; pointer-events: auto; touch-action: none; 
      filter: drop-shadow(0 0 20px rgba(255,255,255,0.3));
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.1s;
      animation: spawn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    @keyframes spawn { 0% { transform: scale(0) rotate(-45deg); opacity: 0; } 100% { transform: scale(1) rotate(0deg); opacity: 1; } }
    
    .ar-object.selected { border: 2px solid var(--primary); border-radius: 15px; background: rgba(0, 245, 255, 0.1); padding: 10px; z-index: 2000 !important; }
    .delete-btn { position: absolute; top: -15px; right: -15px; background: var(--danger); color: white; border: none; width: 30px; height: 30px; border-radius: 50%; font-weight: 900; font-size: 16px; display: none; box-shadow: 0 0 10px rgba(255,0,0,0.5); z-index: 2010; }
    .ar-object.selected .delete-btn { display: block; }

    /* Precision Sidebar */
    #sidebar-controls { position: absolute; right: 20px; top: 120px; display: flex; flex-direction: column; gap: 20px; pointer-events: auto; z-index: 1010; padding: 15px; background: rgba(0,0,0,0.6); border-radius: 20px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    .control-group { display: flex; flex-direction: column; align-items: center; gap: 5px; }
    .control-label { font-size: 0.5rem; font-weight: 900; color: var(--primary); text-transform: uppercase; letter-spacing: 1px; }
    input[type=range] { -webkit-appearance: slider-vertical; width: 10px; height: 100px; background: rgba(255,255,255,0.1); border-radius: 5px; cursor: pointer; }

    /* Massive Catalog */
    #in-cam-selector { 
      position: absolute; bottom: 120px; left: 0; width: 100%; height: 120px; 
      display: flex; gap: 12px; overflow-x: auto; padding: 15px 20px; 
      pointer-events: auto; z-index: 1005; backdrop-filter: blur(25px);
      background: rgba(0,0,0,0.8); border-top: 2px solid rgba(255,255,255,0.1);
      align-items: center; scrollbar-width: none;
    }
    .catalog-section { display: flex; gap: 10px; padding-right: 20px; border-right: 1px solid rgba(255,255,255,0.1); margin-right: 10px; }
    .catalog-section:last-child { border-right: none; }
    .section-label { writing-mode: vertical-lr; font-size: 0.45rem; color: #555; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; }

    .cam-item { flex: 0 0 70px; height: 70px; background: rgba(255,255,255,0.05); border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 1.8rem; border: 1px solid rgba(255,255,255,0.05); transition: 0.2s; position: relative; }
    .cam-item:active { transform: scale(0.9); }
    .cam-label { font-size: 0.4rem; text-transform: uppercase; font-weight: 900; margin-top: 3px; color: #666; letter-spacing: 1px; }

    .ar-bottom-controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: center; gap: 15px; pointer-events: auto; z-index: 1005; }
    .ar-btn { background: rgba(0,0,0,0.85); border: 2px solid white; color: white; padding: 14px 25px; border-radius: 50px; font-weight: 900; font-size: 0.8rem; letter-spacing: 1px; transition: 0.3s; }
    
    #flash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 5000; opacity: 0; pointer-events: none; }
    #status-msg { position: absolute; top: 80px; width: 100%; text-align: center; color: var(--primary); font-weight: 900; letter-spacing: 3px; text-shadow: 0 2px 15px black; pointer-events: none; }
    
    /* Tutorial Overlay */
    #tut { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px; cursor: pointer; }
    #tut h2 { color: var(--primary); font-size: 2.22rem; margin-bottom: 15px; }
    #tut p { color: #888; line-height: 1.6; }
  </style>
</head>
<body>

  <div id="flash"></div>

  <div id="tut" onclick="this.style.opacity='0'; setTimeout(()=>this.style.display='none', 500)">
    <h2>Everything 3D</h2>
    <p>Tap items to add real 3D models.<br>Drag to position.<br>Slide to size.<br>Tap any item to select it.</p>
    <button class="btn-launch" style="margin-top:40px;">ENTER HUB</button>
  </div>

  <div id="main-menu">
    <header id="header">
      <button onclick="window.location.href='index.html'" style="position:absolute; left:18px; top:12px; background:none; border:none; color:#444; font-size:1.5rem;">✕</button>
      <h1>TWIST DESIGN SUPREME 3D</h1>
      <div class="mode-toggle">
        <button id="mode-play" class="mode-btn active play" onclick="setMode('play')">SOULS</button>
        <button id="mode-work" class="mode-btn" onclick="setMode('work')">WORK</button>
      </div>
    </header>

    <div id="preview-container">
      <div class="preview-box">
        <model-viewer id="main-view" src="https://modelviewer.dev/shared-assets/models/Astronaut.glb" ar ar-modes="webxr" camera-controls auto-rotate shadow-intensity="1"></model-viewer>
      </div>
      <button class="btn-launch" onclick="enterAR()">🚀 LAUNCH DESIGNER</button>
    </div>

    <div id="selector-strip"><div id="scroller" class="scroller"></div></div>
  </div>

  <div id="ar-camera-view">
    <video id="v-feed" autoplay playsinline></video>
    <div id="ar-canvas-layer"></div>
    <div id="status-msg">3D MULTI-OBJECT ACTIVE</div>

    <!-- TRANSFORM CONTROLS -->
    <div id="sidebar-controls">
      <div class="control-group">
        <span class="control-label">SIZE</span>
        <input type="range" id="size-slider" min="0.5" max="3" step="0.1" value="1" oninput="updateItem()">
      </div>
    </div>

    <!-- SUPREME 3D CATALOG -->
    <div id="in-cam-selector">
        
        <!-- SOULS SECTION -->
        <div class="catalog-section">
          <span class="section-label">Souls</span>
          <div class="cam-item" onclick="addItem('https://modelviewer.dev/shared-assets/models/Astronaut.glb')"><span>🧑‍🚀</span><span class="cam-label">Astro</span></div>
          <div class="cam-item" onclick="addItem('https://modelviewer.dev/shared-assets/models/RobotExpressive.glb')"><span>🤖</span><span class="cam-label">Robot</span></div>
          <div class="cam-item" onclick="addItem('https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Fox/glTF-Binary/Fox.glb')"><span>🦊</span><span class="cam-label">Fox</span></div>
          <div class="cam-item" onclick="addItem('https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Duck/glTF-Binary/Duck.glb')"><span>🦆</span><span class="cam-label">Duck</span></div>
        </div>

        <!-- FURNITURE 3D SECTION -->
        <div class="catalog-section">
          <span class="section-label">Home</span>
          <div class="cam-item" onclick="addItem('https://raw.githubusercontent.com/ks1505/ma/master/sofa.glb')"><span>🛋️</span><span class="cam-label">Couch</span></div>
          <div class="cam-item" onclick="addItem('https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/SheenChair/glTF-Binary/SheenChair.glb')"><span>🪑</span><span class="cam-label">Chair</span></div>
          <div class="cam-item" onclick="addItem('https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/BoxTextured/glTF-Binary/BoxTextured.glb')"><span>📦</span><span class="cam-label">Box</span></div>
          <div class="cam-item" onclick="document.getElementById('file-in').click()"><span>🖼️</span><span class="cam-label">Upload</span></div>
        </div>

    </div>

    <div class="ar-bottom-controls">
        <button class="ar-btn" onclick="clearAll()" style="border-color: var(--danger); color: var(--danger);">RESET</button>
        <button class="ar-btn" onclick="exitAR()" style="background: var(--danger);">✕ EXIT</button>
        <button class="ar-btn" onclick="saveDesign()">SNAP</button>
    </div>
    <input type="file" id="file-in" style="display:none" onchange="uploadToAR(this)">
  </div>

  <script>
    const menu = document.getElementById('main-menu');
    const camera = document.getElementById('ar-camera-view');
    const canvas = document.getElementById('ar-canvas-layer');
    const vFeed = document.getElementById('v-feed');
    const sizeS = document.getElementById('size-slider');
    const flash = document.getElementById('flash');
    
    let currentMode = 'play';
    let selectedItem = null;

    const catalog = {
      play: [
        { name: 'Astro', icon: '🧑‍🚀', src: 'https://modelviewer.dev/shared-assets/models/Astronaut.glb' },
        { name: 'Robot', icon: '🤖', src: 'https://modelviewer.dev/shared-assets/models/RobotExpressive.glb' },
        { name: 'Fox', icon: '🦊', src: 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Fox/glTF-Binary/Fox.glb' },
        { name: 'Duck', icon: '🦆', src: 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Duck/glTF-Binary/Duck.glb' }
      ],
      work: [
        { name: 'Couch', icon: '🛋️', src: 'https://raw.githubusercontent.com/ks1505/ma/master/sofa.glb' },
        { name: 'Chair', icon: '🪑', src: 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/SheenChair/glTF-Binary/SheenChair.glb' },
        { name: 'Box', icon: '📦', src: 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/BoxTextured/glTF-Binary/BoxTextured.glb' }
      ]
    };

    function setMode(mode) {
        currentMode = mode;
        document.getElementById('mode-play').className = 'mode-btn ' + (mode === 'play' ? 'active play' : '');
        document.getElementById('mode-work').className = 'mode-btn ' + (mode === 'work' ? 'active work' : '');
        renderScroller();
    }

    function renderScroller() {
        const scroller = document.getElementById('scroller');
        scroller.innerHTML = '';
        catalog[currentMode].forEach(item => {
            let card = document.createElement('div');
            card.className = 'char-card';
            card.innerHTML = `<span class="icon">${item.icon}</span>`;
            card.onclick = () => {
                document.querySelectorAll('.char-card').forEach(c => c.classList.remove('active', 'play', 'work'));
                card.classList.add('active', currentMode);
                document.getElementById('main-view').src = item.src;
            };
            scroller.appendChild(card);
        });
        if(scroller.firstChild) scroller.firstChild.click();
    }

    async function enterAR() {
        menu.style.display = 'none';
        camera.style.display = 'block';
        try {
          const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
          vFeed.srcObject = s;
          addItem(catalog[currentMode][0].src);
        } catch(e) { exitAR(); }
    }

    function exitAR() {
        menu.style.display = 'flex';
        camera.style.display = 'none';
        if (vFeed.srcObject) vFeed.srcObject.getTracks().forEach(t => t.stop());
        clearAll();
    }

    function addItem(src) {
        const obj = document.createElement('div');
        obj.className = 'ar-object';
        obj.style.left = '50%';
        obj.style.top = '40%';
        
        let mv = document.createElement('model-viewer');
        mv.src = src;
        mv.style.width = '100%';
        mv.style.height = '100%';
        mv.setAttribute('auto-rotate', '');
        mv.setAttribute('shadow-intensity', '1');
        mv.setAttribute('camera-controls', '');
        
        obj.appendChild(mv);
        obj.innerHTML += `<button class="delete-btn" onclick="this.parentElement.remove()">✕</button>`;

        canvas.appendChild(obj);
        makeDraggable(obj);
        selectObject(obj);
    }

    function selectObject(el) {
        selectedItem = el;
        document.querySelectorAll('.ar-object').forEach(o => o.classList.remove('selected'));
        el.classList.add('selected');
        // We use the scale of the outer div for simplicity here
        const currentScale = el.style.transform.match(/scale\((.*?)\)/);
        sizeS.value = currentScale ? currentScale[1] : 1;
    }

    function updateItem() {
        if (!selectedItem) return;
        selectedItem.style.transform = `scale(${sizeS.value})`;
    }

    function saveDesign() {
      flash.style.opacity = '1';
      setTimeout(() => flash.style.opacity = '0', 200);
      alert('📸 Supreme Design Snapshot Captured!');
    }

    function clearAll() { canvas.innerHTML = ''; selectedItem = null; }

    function uploadToAR(input) {
        if (input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => {
              // Custom photos are still 2D sprites in the 3D world
              const obj = document.createElement('div');
              obj.className = 'ar-object';
              obj.style.left = '50%'; obj.style.top = '40%';
              obj.innerHTML = `<img src="${e.target.result}" style="width:100%; border-radius:15px;"><button class="delete-btn" onclick="this.parentElement.remove()">✕</button>`;
              canvas.appendChild(obj);
              makeDraggable(obj);
              selectObject(obj);
            }
            reader.readAsDataURL(input.files[0]);
        }
    }

    function makeDraggable(el) {
        let dragging = false;
        el.addEventListener('touchstart', (e) => { 
          if(e.target.tagName === 'BUTTON') return;
          dragging = true; selectObject(el); 
        });
        window.addEventListener('touchmove', (e) => {
            if (!dragging) return;
            const t = e.touches[0];
            el.style.left = (t.clientX - 80) + 'px';
            el.style.top = (t.clientY - 80) + 'px';
        });
        window.addEventListener('touchend', () => { dragging = false; });
    }

    setMode('play');
  </script>
</body>
</html>
