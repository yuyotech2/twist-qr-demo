<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TwistQR | AR</title>
    <style>
      body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
      #msg { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: white; padding: 12px 24px; border-radius: 30px; border: 2px solid #00f5ff; z-index: 9999; font-weight: bold; text-align: center; white-space: nowrap; }
      #exit { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #ff0055; color: white; border: none; padding: 14px 35px; border-radius: 50px; font-size: 1rem; font-weight: bold; z-index: 9999; cursor: pointer; }
      #banner { position: fixed; top: 0; left: 0; width: 100%; background: #ff0055; color: white; text-align: center; font-weight: bold; padding: 4px; z-index: 10000; font-size: 0.75rem; }
    </style>
    <script src="https://cdn.jsdelivr.net/gh/aframevr/aframe@1.3.0/dist/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  <body>
    <div id="banner">V8.0 - FAST LOAD</div>
    <div id="msg">Loading AR... please wait</div>
    <button id="exit" onclick="window.location.href='index.html'">EXIT</button>

    <a-scene embedded arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
      <a-marker preset="hiro">
        <a-box position="0 0.5 0" material="color: #8a2be2;" scale="1 1 1"
          animation="property: rotation; to: 0 360 0; dur: 3000; loop: true; easing: linear;">
        </a-box>
        <a-text value="TWIST" position="0 1.3 0" align="center" color="#00f5ff" scale="2 2 2"></a-text>
      </a-marker>
      <a-entity camera></a-entity>
    </a-scene>

    <script>
      window.addEventListener('load', () => {
        setTimeout(() => {
          document.getElementById('msg').innerText = 'Camera ready! Point at the Hiro marker';
          document.getElementById('msg').style.borderColor = '#00f5ff';
        }, 3000);
      });
    </script>
  </body>
</html>
