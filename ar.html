<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TwistQR | Live AR</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #050505; font-family: 'Segoe UI', sans-serif; color: white; min-height: 100vh; display: flex; flex-direction: column; }

    /* Header */
    #header {
      background: linear-gradient(135deg, #0d0d0d, #1a1a2e);
      padding: 12px 20px;
      text-align: center;
      border-bottom: 1px solid rgba(138,43,226,0.3);
    }
    #header h1 { font-size: 1.2rem; color: #00f5ff; letter-spacing: 2px; }
    #header p { font-size: 0.75rem; color: #888; margin-top: 2px; }
    #back-btn { position: absolute; top: 12px; left: 15px; background: none; border: 1px solid #555; color: #aaa; padding: 6px 14px; border-radius: 20px; font-size: 0.8rem; cursor: pointer; }

    /* Viewer */
    #viewer-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: radial-gradient(circle at center, rgba(138,43,226,0.1) 0%, transparent 70%);
    }
    model-viewer {
      width: min(340px, 90vw);
      height: min(340px, 40vh);
      --progress-bar-color: #00f5ff;
      --progress-bar-height: 3px;
    }

    /* AR Button */
    model-viewer .ar-btn {
      background: linear-gradient(135deg, #8a2be2, #00f5ff);
      color: white;
      border: none;
      padding: 14px 32px;
      border-radius: 50px;
      font-weight: 800;
      font-size: 1rem;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(138,43,226,0.4);
      display: block;
      margin: 0 auto 10px;
    }

    /* Model Selector */
    #selector {
      background: rgba(15,15,25,0.95);
      border-top: 1px solid rgba(255,255,255,0.07);
      padding: 15px 10px 25px;
    }
    #selector h3 { text-align: center; font-size: 0.75rem; color: #888; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 12px; }
    #model-grid {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 5px 5px 10px;
      scrollbar-width: none;
    }
    #model-grid::-webkit-scrollbar { display: none; }
    .model-card {
      flex-shrink: 0;
      width: 80px;
      background: rgba(255,255,255,0.05);
      border: 2px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 10px 5px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }
    .model-card:hover, .model-card.active {
      border-color: #8a2be2;
      background: rgba(138,43,226,0.15);
      transform: translateY(-3px);
    }
    .model-card .emoji { font-size: 2rem; display: block; margin-bottom: 6px; }
    .model-card .label { font-size: 0.65rem; color: #aaa; font-weight: 600; }
    .model-card.active .label { color: #00f5ff; }

    /* Info bar */
    #info { text-align: center; padding: 10px; font-size: 0.75rem; color: #666; }
  </style>
</head>
<body>

  <div id="header">
    <button id="back-btn" onclick="window.location.href='index.html'">← Back</button>
    <h1>🌀 TWIST AR</h1>
    <p>Choose a character · Place it in your world</p>
  </div>

  <div id="viewer-wrap">
    <model-viewer
      id="mv"
      src="https://modelviewer.dev/shared-assets/models/Astronaut.glb"
      alt="AR object"
      ar
      ar-modes="webxr scene-viewer quick-look"
      camera-controls
      auto-rotate
      shadow-intensity="1"
      exposure="1">
      <button slot="ar-button" class="ar-btn">🚀 Place in Your World</button>
    </model-viewer>
  </div>

  <div id="info">Spin the model with your finger — then tap <b>Place in Your World</b> to launch AR</div>

  <div id="selector">
    <h3>Pick Your Character</h3>
    <div id="model-grid">
      <div class="model-card active" onclick="switchModel(this, 'https://modelviewer.dev/shared-assets/models/Astronaut.glb', '🧑‍🚀', 'Astronaut')">
        <span class="emoji">🧑‍🚀</span>
        <span class="label">Astronaut</span>
      </div>
      <div class="model-card" onclick="switchModel(this, 'https://modelviewer.dev/shared-assets/models/RobotExpressive.glb', '🤖', 'Robot')">
        <span class="emoji">🤖</span>
        <span class="label">Robot</span>
      </div>
      <div class="model-card" onclick="switchModel(this, 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Duck/glTF-Binary/Duck.glb', '🦆', 'Duck')">
        <span class="emoji">🦆</span>
        <span class="label">Duck</span>
      </div>
      <div class="model-card" onclick="switchModel(this, 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Fox/glTF-Binary/Fox.glb', '🦊', 'Fox')">
        <span class="emoji">🦊</span>
        <span class="label">Fox</span>
      </div>
      <div class="model-card" onclick="switchModel(this, 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/DamagedHelmet/glTF-Binary/DamagedHelmet.glb', '⛑️', 'Helmet')">
        <span class="emoji">⛑️</span>
        <span class="label">Helmet</span>
      </div>
      <div class="model-card" onclick="switchModel(this, 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/FlightHelmet/glTF/FlightHelmet.gltf', '🪖', 'Pilot')">
        <span class="emoji">🪖</span>
        <span class="label">Pilot</span>
      </div>
    </div>
  </div>

  <script>
    function switchModel(card, src, emoji, label) {
      // Update active card
      document.querySelectorAll('.model-card').forEach(c => c.classList.remove('active'));
      card.classList.add('active');

      // Switch model
      const mv = document.getElementById('mv');
      mv.src = src;
      mv.alt = label;

      // Update button
      const btn = mv.querySelector('.ar-btn');
      btn.innerText = emoji + ' Place ' + label + ' in Your World';
    }
  </script>
</body>
</html>
