<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>TwistQR | AR</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #000; font-family: sans-serif; overflow: hidden; }
      #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center; padding: 20px; }
      #status { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: white; padding: 12px 24px; border-radius: 30px; border: 2px solid #00f5ff; z-index: 9998; font-weight: bold; display: none; }
      #exit-btn { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); background: #ff0055; color: white; border: none; padding: 15px 40px; border-radius: 50px; font-size: 1.1rem; font-weight: bold; z-index: 9998; display: none; cursor: pointer; }
      .launch-btn { background: #00f5ff; color: #000; padding: 18px 50px; border-radius: 50px; font-size: 1.3rem; font-weight: bold; border: none; cursor: pointer; margin-top: 30px; }
      .cancel-btn { background: none; border: none; color: #888; font-size: 1rem; margin-top: 20px; text-decoration: underline; cursor: pointer; }
      p { color: #aaa; margin-top: 15px; max-width: 300px; }
    </style>
  </head>
  <body>

    <!-- Start Screen -->
    <div id="overlay">
      <div style="background:#ff0055;padding:5px 15px;border-radius:5px;font-size:0.8rem;font-weight:bold;margin-bottom:30px;">V7.0 - SIMPLIFIED</div>
      <h2 style="font-size:1.8rem;">Point & Play AR</h2>
      <p>Tap Launch, allow camera access, then point at the white card on your screen.</p>
      <button class="launch-btn" onclick="startAR()">LAUNCH CAMERA</button>
      <button class="cancel-btn" onclick="window.location.href='index.html'">Go Back</button>
    </div>

    <div id="status">Loading AR Engine...</div>
    <button id="exit-btn" onclick="window.location.href='index.html'">EXIT</button>

    <!-- AR Scene (autoStart true so it loads in background) -->
    <a-scene id="arScene"
      mindar-image="imageTargetSrc: https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.2/examples/image-tracking/assets/card-example/card.mind; autoStart: false; uiLoading: no; uiScanning: no;"
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false">
      <a-assets>
        <a-asset-item id="model" src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.2/examples/image-tracking/assets/card-example/softbar/scene.gltf"></a-asset-item>
      </a-assets>
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      <a-entity mindar-image-target="targetIndex: 0" id="target">
        <a-gltf-model src="#model" position="0 0 0.1" scale="0.007 0.007 0.007" rotation="0 0 0"></a-gltf-model>
      </a-entity>
    </a-scene>

    <script>
      function startAR() {
        const overlay = document.getElementById('overlay');
        const status = document.getElementById('status');
        const exitBtn = document.getElementById('exit-btn');
        const scene = document.getElementById('arScene');

        overlay.style.display = 'none';
        status.style.display = 'block';
        exitBtn.style.display = 'block';
        status.innerText = 'Starting camera...';

        // Wait for scene to be ready then start
        function doStart() {
          try {
            const sys = scene.systems['mindar-image-system'];
            sys.start();
            status.innerText = 'Camera on! Point at white card.';
            status.style.borderColor = '#00f5ff';
          } catch(e) {
            status.innerText = 'Error - try refreshing';
            status.style.borderColor = 'red';
          }
        }

        if (scene.hasLoaded) {
          doStart();
        } else {
          scene.addEventListener('loaded', doStart);
        }

        // Target events
        document.getElementById('target').addEventListener('targetFound', () => {
          status.innerText = 'MAGIC! Pinch & zoom!';
          status.style.background = 'rgba(138,43,226,0.9)';
        });
        document.getElementById('target').addEventListener('targetLost', () => {
          status.innerText = 'Point at the white card...';
          status.style.background = 'rgba(0,0,0,0.8)';
        });
      }
    </script>
  </body>
</html>
