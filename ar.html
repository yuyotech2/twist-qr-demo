<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
  <title>TwistQR | Professional AR Hub</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    :root {
      --primary: #00f5ff;
      --secondary: #8a2be2;
      --work-accent: #4caf50;
      --bg: #080810;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { background: var(--bg); font-family: 'Segoe UI', system-ui, sans-serif; color: white; height: 100vh; overflow: hidden; }

    /* UI Containers */
    #main-menu { position: relative; height: 100vh; display: flex; flex-direction: column; z-index: 10; background: var(--bg); transition: 0.3s; }
    #ar-camera-view { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1000; background: #000; display: none; }
    #v-feed { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }

    /* Header & Mode Selector */
    #header { padding: 15px; border-bottom: 2px solid var(--primary); text-align: center; background: rgba(0,0,0,0.95); }
    #header h1 { font-size: 0.9rem; letter-spacing: 4px; color: var(--primary); margin-bottom: 12px; font-weight: 900; }
    
    .mode-toggle { display: flex; background: rgba(255,255,255,0.05); border-radius: 50px; padding: 4px; width: 300px; margin: 0 auto; border: 1px solid rgba(255,255,255,0.1); }
    .mode-btn { flex: 1; padding: 12px; border-radius: 50px; border: none; background: none; color: #666; font-weight: 900; font-size: 0.7rem; letter-spacing: 1px; cursor: pointer; transition: 0.3s; }
    .mode-btn.active.play { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; }
    .mode-btn.active.work { background: linear-gradient(135deg, var(--work-accent), #2e7d32); color: white; }

    /* Preview Hub */
    #preview-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
    .preview-box { width: 280px; height: 280px; border-radius: 40px; border: 2px solid rgba(138,43,226,0.3); position: relative; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle, rgba(138,43,226,0.05) 0%, transparent 70%); }
    model-viewer { width: 100%; height: 100%; }
    
    .btn-launch { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; border: none; padding: 16px 50px; border-radius: 50px; font-weight: 900; font-size: 1.1rem; letter-spacing: 2px; margin-top: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); cursor: pointer; }

    /* Main Menu Scroller */
    #selector-strip { background: rgba(0,0,0,0.4); padding: 20px 0 40px; border-top: 1px solid rgba(255,255,255,0.05); }
    .scroller { display: flex; gap: 15px; overflow-x: auto; padding: 0 20px; }
    .scroller::-webkit-scrollbar { display: none; }
    
    .char-card { flex: 0 0 90px; height: 105px; background: rgba(255,255,255,0.03); border: 2px solid rgba(255,255,255,0.1); border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .char-card.active.play { border-color: var(--primary); background: rgba(0,245,255,0.1); }
    .char-card.active.work { border-color: var(--work-accent); background: rgba(76,175,80,0.1); }
    .char-card .icon { font-size: 1.8rem; margin-bottom: 5px; }
    .char-card .name { font-size: 0.6rem; color: #555; text-transform: uppercase; font-weight: 800; }

    /* AR View Interface (The Magic Part) */
    #ar-canvas-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1001; }
    
    /* Live Items being placed */
    .ar-object { position: absolute; width: 130px; pointer-events: auto; touch-action: none; filter: drop-shadow(0 0 15px rgba(255,255,255,0.5)); transition: transform 0.1s; }
    .ar-object.selected { border: 2px solid var(--primary); border-radius: 10px; padding: 5px; }

    /* In-Camera Item Switcher */
    #in-cam-selector { 
      position: absolute; bottom: 110px; left: 0; width: 100%; height: 80px; 
      display: flex; gap: 12px; overflow-x: auto; padding: 0 20px; 
      pointer-events: auto; z-index: 1005; backdrop-filter: blur(10px);
      background: rgba(0,0,0,0.4); align-items: center;
      border-top: 1px solid rgba(255,255,255,0.1);
    }
    .cam-item { 
      flex: 0 0 60px; height: 60px; background: rgba(255,255,255,0.1); 
      border-radius: 15px; display: flex; align-items: center; justify-content: center; 
      font-size: 1.5rem; border: 1px solid rgba(255,255,255,0.2);
    }

    .ar-bottom-controls { 
      position: absolute; bottom: 30px; width: 100%; display: flex; 
      justify-content: center; gap: 15px; pointer-events: auto; z-index: 1005;
    }
    .ar-util-btn { 
      background: rgba(0,0,0,0.8); border: 2px solid white; color: white; 
      padding: 12px 25px; border-radius: 50px; font-weight: 900; font-size: 0.8rem;
    }
    #ar-status { position: absolute; top: 100px; width: 100%; text-align: center; color: var(--primary); font-weight: 900; letter-spacing: 2px; }
  </style>
</head>
<body>

  <!-- PAGE 1: MENU -->
  <div id="main-menu">
    <header id="header">
      <button onclick="window.location.href='index.html'" style="position:absolute; left:18px; top:12px; background:none; border:none; color:#444; font-size:1.5rem;">✕</button>
      <h1>TWIST AR PRO</h1>
      <div class="mode-toggle">
        <button id="mode-play" class="mode-btn active play" onclick="setMode('play')">PLAY MODE</button>
        <button id="mode-work" class="mode-btn" onclick="setMode('work')">WORK MODE</button>
      </div>
    </header>

    <div id="preview-container">
      <div class="preview-box">
        <model-viewer id="main-view" src="https://modelviewer.dev/shared-assets/models/Astronaut.glb" ar ar-modes="webxr" camera-controls auto-rotate autoplay shadow-intensity="1">
          <button id="native-ar-btn" slot="ar-button" style="display:none;"></button>
        </model-viewer>
      </div>
      <button class="btn-launch" onclick="enterAR()">🚀 START DESIGNING ROOM</button>
    </div>

    <div id="selector-strip">
      <div id="scroller" class="scroller">
        <!-- Will be filled by JS based on mode -->
      </div>
    </div>
  </div>

  <!-- PAGE 2: LIVE MULTI-ITEM CAMERA -->
  <div id="ar-camera-view">
    <video id="v-feed" autoplay playsinline></video>
    
    <!-- This is where multiple items will move -->
    <div id="ar-canvas-layer"></div>

    <div id="ar-status">MULTI-OBJECT MODE ACTIVE</div>

    <!-- The In-Camera Switcher -->
    <div id="in-cam-selector">
        <div class="cam-item" onclick="addItem('🧑‍🚀')">🧑‍🚀</div>
        <div class="cam-item" onclick="addItem('🤖')">🤖</div>
        <div class="cam-item" onclick="addItem('🦊')">🦊</div>
        <div class="cam-item" onclick="addItem('🪑')">🪑</div>
        <div class="cam-item" onclick="addItem('🦆')">🦆</div>
        <div class="cam-item" onclick="document.getElementById('file-in').click()">🖼️</div>
    </div>

    <div class="ar-bottom-controls">
        <button class="ar-util-btn" onclick="clearAll()" style="border-color: #ff4444; color: #ff4444;">CLEAR ALL</button>
        <button class="ar-util-btn" onclick="exitAR()" style="background: #ff4444;">✕ EXIT</button>
        <button class="ar-util-btn" onclick="alert('📸 Layout saved to Gallery!')">SAVE</button>
    </div>

    <input type="file" id="file-in" style="display:none" onchange="uploadToAR(this)">
  </div>

  <script>
    const menu = document.getElementById('main-menu');
    const camera = document.getElementById('ar-camera-view');
    const canvas = document.getElementById('ar-canvas-layer');
    const vFeed = document.getElementById('v-feed');
    const mv = document.getElementById('main-view');
    const scroller = document.getElementById('scroller');
    
    let currentMode = 'play';
    const items = {
        play: [
            { name: 'Astronaut', icon: '🧑‍🚀', src: 'https://modelviewer.dev/shared-assets/models/Astronaut.glb' },
            { name: 'Robot', icon: '🤖', src: 'https://modelviewer.dev/shared-assets/models/RobotExpressive.glb' },
            { name: 'Fox', icon: '🦊', src: 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Fox/glTF-Binary/Fox.glb' }
        ],
        work: [
            { name: 'Luxury Chair', icon: '🪑', src: 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/SheenChair/glTF-Binary/SheenChair.glb' },
            { name: 'Duck Decor', icon: '🦆', src: 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Duck/glTF-Binary/Duck.glb' }
        ]
    };

    function setMode(mode) {
        currentMode = mode;
        document.getElementById('mode-play').className = 'mode-btn ' + (mode === 'play' ? 'active play' : '');
        document.getElementById('mode-work').className = 'mode-btn ' + (mode === 'work' ? 'active work' : '');
        renderScroller();
    }

    function renderScroller() {
        scroller.innerHTML = '';
        items[currentMode].forEach(item => {
            let card = document.createElement('div');
            card.className = 'char-card';
            card.innerHTML = `<span class="icon">${item.icon}</span><span class="name">${item.name}</span>`;
            card.onclick = () => {
                document.querySelectorAll('.char-card').forEach(c => c.classList.remove('active', 'play', 'work'));
                card.classList.add('active', currentMode);
                mv.src = item.src;
            };
            scroller.appendChild(card);
        });
        scroller.firstChild.click();
    }

    async function enterAR() {
        menu.style.display = 'none';
        camera.style.display = 'block';
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        vFeed.srcObject = stream;
        // Start with one item
        addItem(currentMode === 'play' ? '🧑‍🚀' : '🪑');
    }

    function exitAR() {
        menu.style.display = 'flex';
        camera.style.display = 'none';
        if (vFeed.srcObject) vFeed.srcObject.getTracks().forEach(t => t.stop());
        clearAll();
    }

    // MULTI-ITEM LOGIC
    let itemID = 0;
    function addItem(iconOrSrc) {
        itemID++;
        const obj = document.createElement('div');
        obj.className = 'ar-object';
        obj.id = 'item-' + itemID;
        obj.style.left = '50%';
        obj.style.top = '40%';
        
        if (iconOrSrc.startsWith('data:image')) {
            obj.innerHTML = `<img src="${iconOrSrc}" style="width:100%; border-radius:10px;">`;
        } else {
            obj.innerHTML = `<div style="font-size: 5rem; text-align: center;">${iconOrSrc}</div>`;
        }

        canvas.appendChild(obj);
        makeDraggable(obj);
    }

    function clearAll() { canvas.innerHTML = ''; }

    function uploadToAR(input) {
        if (input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => addItem(e.target.result);
            reader.readAsDataURL(input.files[0]);
        }
    }

    function makeDraggable(el) {
        let dragging = false;
        el.addEventListener('touchstart', (e) => { 
            dragging = true; 
            document.querySelectorAll('.ar-object').forEach(o => o.classList.remove('selected'));
            el.classList.add('selected');
        });
        window.addEventListener('touchmove', (e) => {
            if (!dragging) return;
            const t = e.touches[0];
            el.style.left = (t.clientX - 65) + 'px';
            el.style.top = (t.clientY - 65) + 'px';
        });
        window.addEventListener('touchend', () => { dragging = false; });
    }

    setMode('play');
  </script>
</body>
</html>
