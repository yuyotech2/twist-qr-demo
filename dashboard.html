<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artist Portal | TwistQR</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body style="background: #000;">
    <div class="bg-mesh"></div>
    
    <div class="container">
        <header style="display: flex; justify-content: space-between; align-items: center; padding: 25px 0;">
            <div class="logo">TWISTQR</div>
            <nav>
                <a href="index.html" class="btn-outline">Exit Portal</a>
            </nav>
        </header>

        <main style="padding: 2rem 0;">
            <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 3rem;">
                <div>
                    <h4 style="color: var(--primary); margin-bottom: 0.5rem; letter-spacing: 2px;">WELCOME BACK,</h4>
                    <h1 style="font-size: 2.5rem; font-weight: 900;">Artist <span class="gradient-text">Studio #042</span></h1>
                </div>
                <div style="text-align: right;">
                    <div style="font-size: 0.9rem; color: rgba(255,255,255,0.5);">Current Balance:</div>
                    <div class="stat-value" style="color: #fff;">$142.50</div>
                </div>
            </div>

            <div class="dashboard-grid" style="display: grid; grid-template-columns: 2fr 1fr; gap: 2rem;">
                <div class="glass-card">
                    <h3 style="margin-bottom: 1.5rem; letter-spacing: 1px; color: var(--primary);">Active Drops</h3>
                    <div style="display: flex; flex-direction: column; gap: 1rem;">
                        <div style="padding: 1.5rem; background: rgba(255,255,255,0.03); border-radius: 16px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--primary);">
                            <div>
                                <h4 style="margin:0; font-size: 1.1rem;">Cosmic Drift Sticker Pack</h4>
                                <p style="font-size: 0.85rem; color: rgba(255,255,255,0.5); margin-top: 4px;">Type: Private Video | 124 Scans Today</p>
                            </div>
                            <span class="gradient-text" style="font-weight: 600; cursor: pointer;">Edit Drop</span>
                        </div>
                        <div style="padding: 1.5rem; background: rgba(255,255,255,0.03); border-radius: 16px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--secondary);">
                            <div>
                                <h4 style="margin:0; font-size: 1.1rem;">Vibe Check Hoodies</h4>
                                <p style="font-size: 0.85rem; color: rgba(255,255,255,0.5); margin-top: 4px;">Type: Neon Face Filter | 98 Scans Today</p>
                            </div>
                            <span class="gradient-text" style="font-weight: 600; cursor: pointer;">Edit Drop</span>
                        </div>
                    </div>
                </div>

                <div class="glass-card">
                    <h3 style="margin-bottom: 1.5rem; letter-spacing: 1px; color: var(--primary);">Quick Stats</h3>
                    <div style="margin-bottom: 2rem;">
                        <div style="font-size: 0.85rem; color: rgba(255,255,255,0.5); margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 1px;">Total Scans</div>
                        <div class="stat-value">4,102</div>
                    </div>
                    <div>
                        <div style="font-size: 0.85rem; color: rgba(255,255,255,0.5); margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 1px;">Revenue</div>
                        <div class="stat-value" style="color: #4caf50;">$820.40</div>
                    </div>
                </div>
            </div>

            <div style="margin-top: 4rem; text-align: center;">
                <button class="btn-primary" style="cursor: pointer; border: none;">+ Create New Drop</button>
            </div>
        </main>
    </div>
</body>
</html>
